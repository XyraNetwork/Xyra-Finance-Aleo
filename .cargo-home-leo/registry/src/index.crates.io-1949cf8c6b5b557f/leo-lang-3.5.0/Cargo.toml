[package]
edition = "2024"
rust-version = "1.92.0"
name = "leo-lang"
version = "3.5.0"
authors = ["The Leo Team <leo@provable.com>"]
build = false
include = [
    "Cargo.toml",
    "leo",
    "README.md",
    "LICENSE.md",
    "examples/lottery/src/main.leo",
    "examples/lottery/run.sh",
    "examples/tictactoe/src/main.leo",
    "examples/tictactoe/run.sh",
    "examples/token/src/main.leo",
    "examples/token/run.sh",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "The Leo programming language"
homepage = "https://leo-lang.org"
readme = "README.md"
keywords = [
    "aleo",
    "cryptography",
    "leo",
    "programming-language",
    "zero-knowledge",
]
categories = [
    "compilers",
    "cryptography",
    "web-programming",
]
license = "GPL-3.0"
repository = "https://github.com/ProvableHQ/leo"

[features]
ci_skip = ["leo-compiler/ci_skip"]
default = []
noconfig = []
only_testnet = []

[lib]
name = "leo_lang"
path = "leo/lib.rs"

[[bin]]
name = "leo"
path = "leo/cli/main.rs"

[[test]]
name = "integration"
